
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalaram Oil Center - Price Check</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.3.3/css/dataTables.dataTables.min.css">
</head>
<style>


#stockAlert {
  position: fixed !important;
  top: 20px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  z-index: 9999 !important;
  display: none; /* jQuery .fadeIn will show it */
  min-width: 320px;
  max-width: 90%;
  text-align: center;
}


</style>
<body>

  

<nav class="navbar navbar-expand-lg navbar-light bg-light" id="myNav">
  <a class="navbar-brand" href="index.html">Jalaram Oil Center</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link " href="index.html">Price Check</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="updateprice.html">Update Price</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="stock.html">Update Stock</a>
      </li>
      <li class="nav-item ml-2">
        <button id="themeToggle" class="btn btn-outline-dark">🌙 Mode</button>
      </li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <h1 class="text-center mb-4">Stock Update</h1>
  <div id="stockAlert" 
     class="alert d-none position-fixed top-0 start-50 translate-middle-x shadow" 
     role="alert" 
     style="z-index: 2000; min-width: 320px; text-align:center;">
</div>


  <div class="form-group position-relative">
    <label for="itemId" style="font-size: 20px;">Item Code</label>
    <input type="text" id="itemId" class="form-control" placeholder="Enter Item Code" autocomplete="off">
    <div id="suggestionList" class="dropdown-menu w-100" style="max-height:200px; overflow-y:auto;"></div>
  </div>

  <!-- Stock Quantity Modal -->
<div class="modal fade" id="stockModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="stockModalLabel">Update Stock</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span>&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form id="stockForm">
          <div class="form-group">
            <label for="stockQty">Enter Quantity</label>
            <input type="number" class="form-control" id="stockQty" placeholder="Enter stock quantity" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="saveStockBtn">Save</button>
      </div>
    </div>
  </div>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.datatables.net/2.3.3/js/dataTables.min.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/theme.js"></script>
<script src="js/price-check.js"></script>
<script src="js/autocomplete.js"></script>

</body>
</html>
