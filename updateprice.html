
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalaram Oil Center - Update Price</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.3.3/css/dataTables.dataTables.min.css">
</head>

<body>

<!-- 🔹 Global Alert (always visible above modal) -->


<nav class="navbar navbar-expand-lg navbar-light bg-light" id="myNav">
  <a class="navbar-brand" href="index.html">Jalaram Oil Center</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="index.html">Price Check</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="updateprice.html">Update Price</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="stock.html">Update Stock</a>
      </li>
      <li class="nav-item ml-2">
        <button id="themeToggle" class="btn btn-outline-dark">🌙 Mode</button>
      </li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
   <h1 class="text-center mb-4">Update Price</h1>

   <div class="form-group">
     <div class="input-group mb-3">
       <div class="custom-file">
         <input type="file" class="custom-file-input" id="upload"  accept=".xlsx, .xls">
         <label class="custom-file-label" for="upload">Choose Excel file</label>
       </div>
     </div>
   </div>

   <div id="uploadProgress">
     <div class="progress">
       <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width:0%">0%</div>
     </div>
   </div>

   <div id="fieldMapping" class="card mt-3" style="display:none;">
     <div class="card-body">
       <h5 class="card-title">Match Excel Columns</h5>
       <div class="form-row">
         <div class="form-group col-md-3">
           <label for="itemIdField">Database itemID</label>
           <select id="itemIdField" class="form-control mapping-select"></select>
         </div>
         <div class="form-group col-md-3">
           <label for="itemNameField">Database item_name</label>
           <select id="itemNameField" class="form-control mapping-select"></select>
         </div>
         <div class="form-group col-md-3">
           <label for="newPriceField">Database new_price</label>
           <select id="newPriceField" class="form-control mapping-select"></select>
         </div>
         <div class="form-group col-md-3">
           <label for="qtyField">Database QTY (optional)</label>
           <select id="qtyField" class="form-control mapping-select"></select>
         </div>
       </div>
       <button id="previewRows" class="btn btn-outline-primary">Preview Matched Data</button>
       <small class="form-text text-muted mt-2">Item IDs are trimmed and cleaned before matching with the database.</small>
     </div>
   </div>

   <button id="updateDb" class="btn btn-primary btn-block" style="display:none;">Update Database</button>

   <p id="summary" class="mt-3"></p>
   <h3>Updated Data Preview:</h3>
   <pre id="output"></pre>

   <h3>Update Log:</h3>
   <table id="logTable" class="display" width="100%"></table>
</div>

<!-- Stock Modal -->
<div class="modal fade" id="stockModal" tabindex="-1" role="dialog" aria-labelledby="stockModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="stockModalLabel">Update Stock</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span>&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="number" class="form-control" id="stockQty" placeholder="Enter new quantity">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="saveStockBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.datatables.net/2.3.3/js/dataTables.min.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/theme.js"></script>
<script src="js/upload.js"></script>
<script src="js/stock.js"></script> <!-- 🔹 Your new JS file -->
</body>
</html>
